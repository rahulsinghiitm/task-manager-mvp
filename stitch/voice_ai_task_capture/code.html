            fontFamily: {

              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .mic-pulse {
            box-shadow: 0 0 0 0 rgba(93, 94, 97, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(93, 94, 97, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 40px rgba(93, 94, 97, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(93, 94, 97, 0); }
        }
        .bg-mesh {
            background-color: #faf9fc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(226, 226, 229, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(223, 226, 235, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(251, 75, 65, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(93, 94, 97, 0.1) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-bright font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#faf9fc]/70 backdrop-blur-xl flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmm4W_P8vh982TOESbkHxInLcQMiTuxTe-9nWVpWjGk8idOrPlsPA7CPmWNjHfgmPHSYFll-gsKIRqSVVxh-YvItPc1-Jq4-B72EVjSsZpv-OL0qAhVBDtu2yJ8zy9OkHmTw0UQ46tLCFpi5_9r6K4bP17sYiBvxct6k1b9O4JksJv8_HAgEA4NYlTM_Mm_KsqBbnJ9FMuaNYrG8YeQwVJpQVB6mO9HGIP3rYLSXDeHJrZOl56GKNGFnd_sD63DwdEYkIL9Ax4j_M"/>
</div>
<h1 class="font-['Manrope'] font-semibold tracking-tight text-xl text-slate-700">Smart Add</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined text-slate-700">search</span>
</button>
</header>
<!-- Main Content: Smart Capture Canvas -->
<main class="flex-grow pt-24 pb-32 px-8 flex flex-col items-center justify-center bg-mesh">
<!-- Live Transcription Section -->
<div class="w-full max-w-2xl mb-12 text-center">
<p class="font-headline text-3xl md:text-4xl font-light text-on-surface leading-snug tracking-tight">
                “Call <span class="text-primary font-semibold">John</span> tomorrow about <span class="text-primary font-semibold">Flywheel</span> proposal at <span class="text-primary font-semibold">2 PM</span>”
            </p>
<div class="mt-4 flex justify-center gap-1">
<div class="w-1 h-1 rounded-full bg-primary opacity-20"></div>
<div class="w-1 h-1 rounded-full bg-primary opacity-40"></div>
<div class="w-1 h-1 rounded-full bg-primary opacity-60"></div>
</div>
</div>
<!-- Central Mic Action -->
<div class="relative flex items-center justify-center mb-16">
<!-- Pulsing Rings -->
<div class="absolute w-48 h-48 rounded-full border border-primary/10 animate-ping"></div>
<div class="absolute w-64 h-64 rounded-full border border-primary/5 animate-pulse"></div>
<!-- Main Mic Button -->
<button class="w-32 h-32 rounded-full bg-gradient-to-br from-primary to-primary-dim shadow-2xl flex items-center justify-center text-white mic-pulse z-10">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- AI Parsing Chips -->
<div class="w-full max-w-xl">
<div class="flex flex-wrap justify-center gap-3">
<!-- Project Chip -->
<div class="flex items-center gap-2 bg-secondary-container px-4 py-2 rounded-full transition-all duration-500 transform translate-y-0 opacity-100">
<span class="material-symbols-outlined text-sm">folder</span>
<span class="font-label text-xs font-medium uppercase tracking-widest text-on-secondary-container">Project: Flywheel</span>
</div>
<!-- Deadline Chip -->
<div class="flex items-center gap-2 bg-surface-container-high px-4 py-2 rounded-full transition-all duration-500 delay-100 transform translate-y-0 opacity-100">
<span class="material-symbols-outlined text-sm">event</span>
<span class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant">Tomorrow 2 PM</span>
</div>
<!-- Priority Chip -->
<div class="flex items-center gap-2 bg-tertiary-container/10 px-4 py-2 rounded-full border border-tertiary-container/20 transition-all duration-500 delay-200 transform translate-y-0 opacity-100">
<span class="material-symbols-outlined text-sm text-tertiary" style="font-variation-settings: 'FILL' 1;">priority_high</span>
<span class="font-label text-xs font-medium uppercase tracking-widest text-tertiary">Priority: High</span>
</div>
<!-- Person Chip -->
<div class="flex items-center gap-2 bg-primary-fixed px-4 py-2 rounded-full transition-all duration-500 delay-300 transform translate-y-0 opacity-100">
<span class="material-symbols-outlined text-sm">person</span>
<span class="font-label text-xs font-medium uppercase tracking-widest text-on-primary-fixed">Contact: John</span>
</div>
</div>
<!-- Listening Indicator -->
<div class="mt-12 text-center">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-outline flex items-center justify-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
                    AI is processing your request
                </span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full px-6 pb-8 pt-4 flex justify-around items-center bg-[#faf9fc]/70 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-slate-400 p-2 hover:text-slate-700 transition-colors" href="#">
<span class="material-symbols-outlined mb-1">wb_sunny</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium">Today</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 p-2 hover:text-slate-700 transition-colors" href="#">
<span class="material-symbols-outlined mb-1">tty</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium">Projects</span>
</a>
<!-- Active State: Add -->
<a class="flex flex-col items-center justify-center bg-[#5d5e61] text-white rounded-full p-3 transition-all duration-300 shadow-lg scale-110" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="sr-only">Add</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 p-2 hover:text-slate-700 transition-colors" href="#">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium">Calendar</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 p-2 hover:text-slate-700 transition-colors" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium">Settings</span>
</a>
</nav>
</body></html>
